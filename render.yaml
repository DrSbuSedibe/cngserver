services:
  - type: web
    name: cngserver
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: EMAIL_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RECEIVER_EMAILS
        sync: false
      - key: RESEND_TIMEOUT_MS
        value: 20000
      - key: RESEND_RETRY_ATTEMPTS
        value: 3
      - key: FRONTEND_URL
        value: https://cngsurvey.netlify.app

