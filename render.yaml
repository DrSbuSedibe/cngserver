services:
  - type: web
    name: cngserver
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install --prefix server
    startCommand: npm start --prefix server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: EMAIL_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: onboarding@resend.dev
      - key: RECEIVER_EMAILS
        sync: false
      - key: FRONTEND_URL
        value: https://cngsurvey.netlify.app