services:
  - type: web
    name: cngserver
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm install --prefix server
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: EMAIL_PROVIDER
        value: smtp
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: RECEIVER_EMAILS
        sync: false
      - key: SMTP_RETRY_ATTEMPTS
        value: 3
      - key: FRONTEND_URL
        value: https://cngsurvey.netlify.app

